<!DOCTYPE html>
<html>

<head>

<title>Track Booking</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-6">

🚖 Track Your Booking

</h1>

<input
id="bookingId"
placeholder="Enter Booking ID"
class="w-full border p-3 rounded mb-4"/>

<button
onclick="trackBooking()"
class="w-full bg-green-500 text-white py-2 rounded">

Track Booking

</button>

<div
id="result"
class="mt-6 text-center text-lg font-medium">

</div>

</div>

<script>

/* ================= API ================= */

const API =
"https://script.google.com/macros/s/AKfycbzMG4yuAwD-5cRbOLdl5uWhtyURFFV10n5CD2WeRvNQtC0sJ7GNivmrDEEXQQ97RxXe/exec";

/* ================= TRACK ================= */

async function trackBooking(){

let id =
document
.getElementById("bookingId")
.value
.trim();

if(!id){

document
.getElementById("result")
.innerHTML =
"❌ Please enter Booking ID";

return;

}

try{

let response =
await fetch(
API +
"?action=track&id=" +
id
);

let data =
await response.json();

if(data.status === "not_found"){

document
.getElementById("result")
.innerHTML =
"❌ Booking Not Found";

return;

}

document
.getElementById("result")
.innerHTML =

"<p>Status: <b>" +
data.status +
"</b></p>" +

"<p>Driver: <b>" +
(data.driver || "Not Assigned") +
"</b></p>" +

"<p>Vehicle: <b>" +
(data.vehicle || "-") +
"</b></p>";

}

catch(err){

document
.getElementById("result")
.innerHTML =
"❌ Error fetching booking";

console.log(err);

}

}

</script>

</body>

</html>
